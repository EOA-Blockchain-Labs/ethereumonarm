--beacon-node-timeout=3s \
--beacon-node-submit-timeout=4s \
--fallback-beacon-node-endpoints=http://change_to_control_node_ip:5052 \
--p2p-tcp-address=change_to_local_vpn_ip:3610 \
--p2p-external-hostname=change_to_local_vpn_ip \
--p2p-relays=http://change_to_control1_node_ip:3640,http://change_to_control2_node_ip:3640,https://0.relay.obol.tech \
--monitoring-address=0.0.0.0:3620 \
--builder-api"